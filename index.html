<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>共闘コードネーム - AIシンクロテスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <section id="start-screen" class="start-screen">
      <div class="start-content">
        <h1>AI共闘コードネーム</h1>
        <button id="start-btn" type="button" onclick="startGame()">スタート</button>
        <a class="rules-link" href="#" aria-disabled="true">ルール説明</a>
      </div>
    </section>
    <div id="turn-banner" class="turn-banner player-turn" aria-live="polite">あなたのターン</div>
    <header>
      <h1>AI共闘コードネーム</h1>
      <div class="status-bar">
        <span class="turn-info">あなたのターン</span>
        <span class="score-info">残り: <span id="ally-left">8</span>枚</span>
      </div>
      <!-- <button id="spymaster-toggle-btn" onclick="toggleSpymaster()">👁️ 答えを隠す</button> -->
    </header>

    <main>
      <div id="board" class="board-grid spymaster-mode">
        </div>
    </main>

    <section class="xai-area">
      <div class="ai-character">
        <div class="ai-icon">🤖</div>
        <div class="ai-bubble" id="ai-message">
          マスター、ヒントをお願いします！ベクトル空間の準備はできています。
        </div>
      </div>
      <div id="vector-graph" class="vector-graph hidden">
        <div class="graph-row"><span class="word">1位: 鯨</span> <progress max="100" value="85"></progress> <span class="score">0.85</span></div>
        <div class="graph-row"><span class="word">2位: 卵</span> <progress max="100" value="82"></progress> <span class="score">0.82</span></div>
      </div>
    </section>

    <footer class="input-area">
      <div class="input-group">
        <input type="text" id="hint-word" placeholder="ヒント単語 (例: うみ)">
        <select id="hint-number">
          <option value="1">1枚</option>
          <option value="2" selected>2枚</option>
          <option value="3">3枚</option>
          <option value="4">4枚</option>
        </select>
      </div>
      <button id="submit-btn" onclick="submitHint()">AIに伝える</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
